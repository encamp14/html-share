<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>使用方法 Rebake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; }
  .page {
    width: 794px; height: 1123px; background: #ffffff;
    padding: 70px 64px; position: relative;
  }
  .header { text-align: center; margin-bottom: 56px; }
  .title { font-size: 40px; font-weight: 600; letter-spacing: 0.16em; color: #1a1a1a; }
  .subtitle { font-size: 15px; letter-spacing: 0.45em; color: #9a9a9a; margin-top: 12px; }
  .accent { width: 56px; height: 3px; background: #185FA5; margin: 22px auto 0; }
  .step { display: flex; gap: 28px; align-items: flex-start; margin-bottom: 44px; }
  .photo-wrap { position: relative; flex-shrink: 0; }
  .photo {
    width: 150px; height: 150px; background: #eceae3;
    border: 1px dashed #c4c2b9; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #a8a69d; font-size: 14px;
  }
  .num {
    position: absolute; top: -14px; left: -14px;
    width: 42px; height: 42px; border-radius: 50%;
    background: #185FA5; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 600;
  }
  .text { padding-top: 6px; }
  .step-title { font-size: 19px; font-weight: 600; color: #1a1a1a; margin-bottom: 10px; }
  .step-body { font-size: 15px; line-height: 1.85; color: #4a4a4a; }
  .note { font-size: 12px; color: #9a9a9a; margin-top: 8px; line-height: 1.7; }
</style>
</head>
<body>
<div class="page" data-document-role="page" data-label="使用方法 Rebake">

  <div class="header">
    <div class="title">使用方法</div>
    <div class="subtitle">REBAKE</div>
    <div class="accent"></div>
  </div>

  <div class="step">
    <div class="photo-wrap">
      <div class="photo">写真</div>
      <div class="num">1</div>
    </div>
    <div class="text">
      <div class="step-title">必要な分だけ解凍します。</div>
      <div class="step-body">・冷蔵解凍（約5℃）：約7〜8時間<br>・電子レンジ解凍（600W）：約60〜90秒</div>
      <div class="note">※ご家庭の環境により解凍時間が前後する場合があります。</div>
    </div>
  </div>

  <div class="step">
    <div class="photo-wrap">
      <div class="photo">写真</div>
      <div class="num">2</div>
    </div>
    <div class="text">
      <div class="step-title">オーブンで焼き上げます。</div>
      <div class="step-body">スチーム機能や霧吹きでコルニチョーネ（耳）に水分を補い、200℃のオーブンで約4〜5分。</div>
    </div>
  </div>

  <div class="step">
    <div class="photo-wrap">
      <div class="photo">写真</div>
      <div class="num">3</div>
    </div>
    <div class="text">
      <div class="step-title">事前解凍をしない場合は、</div>
      <div class="step-body">予熱済み250℃のスチームオーブンへ。<br>・マルゲリータ：7〜10分<br>・クアトロフォルマッジ：5分<br>・トマトソース：4分30秒</div>
      <div class="note">※リベイク時間を目安に、お好みの焼き色を出してください。</div>
    </div>
  </div>

  <div class="step">
    <div class="photo-wrap">
      <div class="photo">写真</div>
      <div class="num">4</div>
    </div>
    <div class="text">
      <div class="step-title">焼きたてピッツァのできあがりです。</div>
    </div>
  </div>

</div>
</body>
</html>
