<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>けん玉10連チャレンジ POP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Yuji+Syuku&family=Dela+Gothic+One&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --paper:#FFFBF2;
    --paper2:#FFEFC9;
    --ink:#2E2A24;
    --terra:#EA4524;
    --terra-d:#C7331A;
    --green:#1FA35A;
    --green-d:#178047;
    --gold:#F7B917;
    --cream:#FFFDF8;
    --sky:#12A8C4;
  }
  html,body{ background:#d9d2c4; font-family:"Zen Maru Gothic",sans-serif; color:var(--ink); }

  /* A4縦 210 x 297mm */
  .page{
    width:210mm; height:297mm;
    margin:16px auto;
    background:
      radial-gradient(circle at 15% 12%, rgba(255,255,255,.5), transparent 40%),
      linear-gradient(160deg, var(--paper) 0%, var(--paper2) 100%);
    position:relative; overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,.25);
    padding:16mm 14mm 20mm;
    display:flex; flex-direction:column;
  }

  /* 上下の飾り帯 */
  .page::before{
    content:""; position:absolute; top:0; left:0; right:0; height:10mm;
    background:repeating-linear-gradient(45deg,var(--green) 0 14px,var(--green-d) 14px 28px);
  }
  .page::after{
    content:""; position:absolute; bottom:0; left:0; right:0; height:10mm;
    background:repeating-linear-gradient(45deg,var(--green) 0 14px,var(--green-d) 14px 28px);
  }

  /* ヘッダー */
  .eyebrow{
    text-align:center; margin-top:4mm;
    font-family:"Zen Maru Gothic",sans-serif; letter-spacing:.3em;
    color:#6b4423; font-size:14pt; font-weight:700;
  }
  .eyebrow span{ background:var(--cream); padding:4px 18px; border:2px solid #6b4423; border-radius:30px; }

  .title{
    text-align:center; line-height:1; margin-top:6mm;
  }
  .title .kendama-word{
    font-family:"Dela Gothic One",cursive; color:var(--green-d);
    font-size:56pt; text-shadow:3px 3px 0 var(--gold), 6px 6px 0 rgba(0,0,0,.08);
    display:block;
  }
  .title .ten{
    font-family:"Dela Gothic One",cursive; color:var(--terra);
    font-size:82pt; display:inline-block; line-height:.9; margin-top:2mm;
    text-shadow:3px 3px 0 rgba(255,255,255,.6);
  }
  .title .ten small{ font-size:40pt; color:var(--ink); }
  .title .challenge{
    font-family:"Dela Gothic One",cursive; font-size:40pt; color:var(--ink);
    display:inline-block; vertical-align:middle; margin-left:6px;
  }

  /* 賞品ゾーン */
  .prize{
    margin:7mm auto 0; width:90%;
    background:linear-gradient(135deg,#FFD84D,#F7B917);
    border:5px solid #fff; border-radius:22px;
    padding:7mm 5mm 6mm; text-align:center; position:relative;
    box-shadow:0 0 0 5px var(--terra), 0 10px 22px rgba(0,0,0,.18);
  }
  .prize .lead{ font-size:16.5pt; font-weight:700; color:var(--ink); white-space:nowrap; }
  .prize .lead b{ color:var(--green-d); font-size:21pt; }
  .prize .reward{
    margin-top:4mm; font-family:"Dela Gothic One",cursive;
    font-size:38pt; color:#fff; line-height:1.15;
    background:var(--terra); display:inline-block;
    padding:3mm 9mm; border-radius:16px;
    box-shadow:0 5px 0 var(--terra-d), 0 8px 14px rgba(0,0,0,.15);
    text-shadow:2px 2px 0 rgba(0,0,0,.2);
  }
  .prize .reward .free{ color:#fff; }
  .ribbon{
    position:absolute; top:-18px; left:50%; transform:translateX(-50%);
    background:var(--terra); color:#fff; font-weight:700; font-size:13pt;
    padding:6px 24px; border-radius:20px; letter-spacing:.15em;
    box-shadow:0 3px 6px rgba(0,0,0,.25); border:2px solid #fff;
  }

  /* けん玉イラスト */
  .kendama-illust{ position:absolute; }
  .k-left{ left:3mm; top:60mm; width:33mm; transform:rotate(-8deg); }
  .k-right{ right:3mm; top:120mm; width:30mm; transform:rotate(8deg); }

  /* ルール & 料金 */
  .body{ display:flex; gap:6mm; margin-top:7mm; }
  .card{
    flex:1; background:var(--cream); border-radius:18px;
    padding:6mm 6mm; border:2.5px solid var(--ink);
    box-shadow:5px 5px 0 rgba(58,46,34,.12);
  }
  .card h3{
    font-family:"Zen Maru Gothic",sans-serif; font-weight:900; font-size:16pt; color:#fff;
    background:var(--green); display:inline-block; padding:5px 20px;
    border-radius:10px; margin-bottom:4mm; letter-spacing:.06em;
  }
  .card.price h3{ background:var(--terra); }

  .rule-list{ list-style:none; }
  .rule-list li{ font-size:14.5pt; line-height:1.7; padding-left:30px; position:relative; margin-bottom:4px; font-weight:500;}
  .rule-list li::before{
    content:"✓"; position:absolute; left:0; top:0;
    color:var(--terra); font-weight:900; font-size:16pt;
  }

  .price-row{
    padding:5mm 2mm; border-bottom:2px dashed #d8ccae; text-align:center;
  }
  .price-row:last-child{ border-bottom:none; }
  .pline{ display:flex; align-items:center; justify-content:center; gap:10px; }
  .price-row .yen{ font-family:"Dela Gothic One",cursive; font-size:23pt; color:var(--ink); }
  .price-row .arrow{ font-size:15pt; color:#c3a45a; }
  .price-row .times{ font-size:17pt; font-weight:700; color:var(--ink); }
  .price-row .times b{ font-size:26pt; color:var(--terra); }
  .price-row.best{
    background:linear-gradient(90deg,#fff3d6,#ffe9b8);
    border-radius:12px; border:none; position:relative;
    box-shadow:inset 0 0 0 3px var(--gold);
  }
  .best-badge{
    position:absolute; top:-14px; right:10px; background:var(--terra);
    color:#fff; font-size:11pt; font-weight:700; padding:3px 14px;
    border-radius:14px; transform:rotate(4deg); box-shadow:0 2px 4px rgba(0,0,0,.2);
  }
  .per{ font-size:11pt; color:#8a7c5f; display:block; margin-top:3mm; font-weight:700; }

  /* フッター */
  .foot{
    margin-top:auto; text-align:center; padding-top:5mm;
  }
  .foot .staff{
    display:inline-block; background:var(--ink); color:var(--cream);
    font-size:13pt; padding:6px 24px; border-radius:24px; font-weight:500;
    letter-spacing:.08em;
  }
  .foot .brand{ margin-top:3mm; font-family:"Zen Maru Gothic",sans-serif; font-weight:700; font-size:15pt; color:var(--green-d); letter-spacing:.25em;}
  .foot .note{ font-size:10pt; color:#8a7c5f; margin-top:2mm; margin-bottom:2mm; }

  @page{ size:A4 portrait; margin:0; }
  @media print{
    html,body{ background:#fff; }
    .page{ margin:0; box-shadow:none; }
  }
</style>
</head>
<body>
<div class="page" data-document-role="page" data-label="けん玉10連チャレンジ">

  <div class="eyebrow"><span>ｅｎＣａｍｐ　あそび企画</span></div>

  <div class="title">
    <span class="kendama-word">けん玉</span>
    <span class="ten">10<small>連</small></span><span class="challenge">チャレンジ</span>
  </div>

  <!-- けん玉イラスト（左・玉あか／手描き風ぽってり） -->
  <svg class="kendama-illust k-left" viewBox="0 0 190 255" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#6b4423" stroke-linejoin="round" stroke-linecap="round" fill="#E3C48D">
      <!-- 糸（輪っか） -->
      <path d="M112 210 C158 214, 156 252, 108 244" fill="none" stroke-width="3.5"/>
      <!-- けん首（玉と皿胴つなぎ） -->
      <rect x="85" y="84" width="20" height="36" rx="5" stroke-width="4.5"/>
      <!-- 持ち手 -->
      <path d="M80 150 Q77 185 83 206 L107 206 Q113 185 110 150 Z" stroke-width="4.5"/>
      <!-- 中皿（下端） -->
      <path d="M79 206 Q75 240 95 243 Q115 240 111 206 Z" stroke-width="4.5"/>
      <ellipse cx="95" cy="208" rx="16" ry="4.5" fill="#d4af7a" stroke-width="3"/>
      <!-- 糸巻きリング -->
      <path d="M83 196 L107 196" stroke-width="3"/>
      <path d="M83 201 L107 201" stroke-width="3"/>
      <!-- 皿胴（横の樽） -->
      <rect x="40" y="106" width="110" height="42" rx="16" stroke-width="4.5"/>
      <ellipse cx="46" cy="127" rx="12" ry="21" fill="#d4af7a" stroke-width="4"/>
      <ellipse cx="144" cy="127" rx="10" ry="18" fill="#d4af7a" stroke-width="4"/>
      <!-- 玉（赤・けん先に刺さる） -->
      <circle cx="95" cy="60" r="48" fill="#EA4524" stroke-width="4.5"/>
    </g>
    <!-- 玉の陰影とツヤ -->
    <path d="M64 74 Q72 100 106 90" fill="none" stroke="#C7331A" stroke-width="11" stroke-linecap="round" opacity=".5"/>
    <ellipse cx="113" cy="42" rx="14" ry="17" fill="#f6b0a1" opacity=".9"/>
  </svg>
  <!-- けん玉イラスト（右・玉みどり／手描き風ぽってり） -->
  <svg class="kendama-illust k-right" viewBox="0 0 190 255" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#6b4423" stroke-linejoin="round" stroke-linecap="round" fill="#E3C48D">
      <path d="M112 210 C158 214, 156 252, 108 244" fill="none" stroke-width="3.5"/>
      <rect x="85" y="84" width="20" height="36" rx="5" stroke-width="4.5"/>
      <path d="M80 150 Q77 185 83 206 L107 206 Q113 185 110 150 Z" stroke-width="4.5"/>
      <path d="M79 206 Q75 240 95 243 Q115 240 111 206 Z" stroke-width="4.5"/>
      <ellipse cx="95" cy="208" rx="16" ry="4.5" fill="#d4af7a" stroke-width="3"/>
      <path d="M83 196 L107 196" stroke-width="3"/>
      <path d="M83 201 L107 201" stroke-width="3"/>
      <rect x="40" y="106" width="110" height="42" rx="16" stroke-width="4.5"/>
      <ellipse cx="46" cy="127" rx="12" ry="21" fill="#d4af7a" stroke-width="4"/>
      <ellipse cx="144" cy="127" rx="10" ry="18" fill="#d4af7a" stroke-width="4"/>
      <circle cx="95" cy="60" r="48" fill="#1FA35A" stroke-width="4.5"/>
    </g>
    <path d="M64 74 Q72 100 106 90" fill="none" stroke="#178047" stroke-width="11" stroke-linecap="round" opacity=".5"/>
    <ellipse cx="113" cy="42" rx="14" ry="17" fill="#9ad9b7" opacity=".9"/>
  </svg>

  <!-- 賞品 -->
  <div class="prize">
    <div class="ribbon">★ 挑戦者 大 募 集 ★</div>
    <div class="lead">ならんだ <b>10個の大皿</b> ぜんぶに玉をのせたら…</div>
    <div class="reward"><span class="free">宿泊無料券</span> ＧＥＴ！</div>
  </div>

  <!-- ルール＆料金 -->
  <div class="body">
    <div class="card">
      <h3>あそび方</h3>
      <ul class="rule-list">
        <li>10個のけん玉がならんでいます</li>
        <li>ぜんぶの大皿に玉をのせたらクリア！</li>
        <li>料金ぶんだけ何回でも挑戦OK</li>
      </ul>
    </div>

    <div class="card price">
      <h3>チャレンジ料金</h3>
      <div class="price-row">
        <div class="pline">
          <span class="yen">¥1,000</span>
          <span class="arrow">▶</span>
          <span class="times"><b>3</b>回</span>
        </div>
      </div>
      <div class="price-row best">
        <span class="best-badge">断然おトク！</span>
        <div class="pline">
          <span class="yen">¥2,000</span>
          <span class="arrow">▶</span>
          <span class="times"><b>10</b>回</span>
        </div>
        <span class="per">1回あたり200円！</span>
      </div>
    </div>
  </div>

  <!-- フッター -->
  <div class="foot">
    <span class="staff">▶ 挑戦したい方はスタッフまでお声がけください ◀</span>
    <div class="brand">ｅｎＣａｍｐ　ｇｌａｍｐｉｎｇ</div>
    <div class="note">※無料券の有効期限・ご利用条件はスタッフがご案内します</div>
  </div>

</div>
</body>
</html>
